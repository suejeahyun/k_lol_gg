<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05070d" />
    <title>K-LOL.GG</title>
    <style>
      :root {
        color-scheme: dark;
        background: #05070d;
        color: #e2e8f0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 50% 20%, rgba(56, 189, 248, 0.18), transparent 34%),
          linear-gradient(180deg, #05070d, #020617);
      }

      main {
        display: grid;
        gap: 10px;
        width: min(320px, calc(100vw - 40px));
        text-align: center;
      }

      strong {
        font-size: 28px;
        font-weight: 950;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: rgba(203, 213, 225, 0.78);
        font-size: 13px;
        font-weight: 800;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>K-LOL.GG</strong>
      <p>앱 화면을 불러오는 중입니다. 네트워크 연결을 확인해주세요.</p>
    </main>
  </body>
</html>
